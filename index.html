<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyage Pro | Safari Stable</title>
    <!-- Solid Script Loading for Safari -->
    <script src="https://tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        :root { --font-main: -apple-system, "SF Pro Display", sans-serif; --apple-blue: #007AFF; }
        body { font-family: var(--font-main); margin: 0; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        /* Liquid Glass Optimized for WebKit (Safari) */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .full-app { display: flex; flex-direction: column; height: 100vh; }
        .sidebar { width: 320px; border-right: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [events, setEvents] = useState([]);
            const [budget, setBudget] = useState(0);

            useEffect(() => {
                const session = localStorage.getItem('voyage_remember');
                if (session) setIsLoggedIn(true);
            }, []);

            if (!isLoggedIn) return <Login onLogin={() => setIsLoggedIn(true)} />;

            return (
                <div className="full-app">
                    <header className="h-16 flex justify-between items-center px-8 border-b border-white/10 liquid-glass">
                        <div className="font-bold text-xl">◈ Voyage Pro</div>
                        <button onClick={() => {localStorage.clear(); window.location.reload();}} className="text-xs font-bold text-red-500 uppercase">Logout</button>
                    </header>
                    <div className="flex-1 flex">
                        <aside className="sidebar p-8 liquid-glass">
                            <h2 className="text-[10px] font-bold uppercase opacity-50 mb-6">Current Budget</h2>
                            <div className="text-4xl font-bold text-blue-400">$0.00</div>
                        </aside>
                        <main className="flex-1 p-12 overflow-y-auto bg-black/50">
                            <h1 className="text-5xl font-bold mb-8">Safari Ready</h1>
                            <div className="p-8 liquid-glass rounded-3xl text-center opacity-40 italic">
                                Use the sidebar to create your first event.
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        function Login({ onLogin }) {
            const [rem, setRem] = useState(false);
            return (
                <div className="h-screen w-screen flex items-center justify-center p-8 bg-gradient-to-br from-gray-900 to-black">
                    <div className="w-full max-w-sm p-12 liquid-glass rounded-[40px] text-center">
                        <h2 className="text-4xl font-bold mb-8">Sign In</h2>
                        <div className="space-y-4 mb-6">
                            <input type="text" placeholder="Travel ID" className="w-full p-4 rounded-2xl bg-white/5 outline-none border border-white/10" />
                            <input type="password" placeholder="Password" className="w-full p-4 rounded-2xl bg-white/5 outline-none border border-white/10" />
                        </div>
                        <div className="flex items-center gap-3 mb-10 px-2">
                            <input type="checkbox" checked={rem} onChange={() => setRem(!rem)} className="w-5 h-5 accent-blue-500" />
                            <label className="text-xs opacity-60">Remember me</label>
                        </div>
                        <button onClick={() => { if(rem) localStorage.setItem('voyage_remember', 'true'); onLogin(); }} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold">Enter</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
